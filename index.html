    function buildScoringMatrix() {
        const rows = Papa.parse(RAW_RULES_TXT.trim(), { header: true }).data;
        rows.forEach(r => {
            const gender = r.性別;
            const ageGrp = r.年齡層;
            const item = r.項目;
            const op = r.比較方式;
            const score = parseInt(r.得分);
            const val = parseFloat(r.值);

            if (!SCORING_ENGINE[gender]) SCORING_ENGINE[gender] = {};
            if (!SCORING_ENGINE[gender][ageGrp]) SCORING_ENGINE[gender][ageGrp] = {};
            if (!SCORING_ENGINE[gender][ageGrp][item]) SCORING_ENGINE[gender][ageGrp][item] = { op, steps: [] };

            SCORING_ENGINE[gender][ageGrp][item].steps.push({ v: val, s: score });
        });

        // 進行排序：>= 由大到小排，<= 由小到大排
        for (let g in SCORING_ENGINE) {
            for (let a in SCORING_ENGINE[g]) {
                for (let i in SCORING_ENGINE[g][a]) {
                    const rule = SCORING_ENGINE[g][a][item]; // 修正為目前迴圈項目
                    // 這裡因項目名稱迴圈變數 i，下面修正邏輯
                }
            }
        }
        // 修正排序邏輯
        Object.keys(SCORING_ENGINE).forEach(g => {
            Object.keys(SCORING_ENGINE[g]).forEach(a => {
                Object.keys(SCORING_ENGINE[g][a]).forEach(i => {
                    const rule = SCORING_ENGINE[g][a][i];
                    if (rule.op === '>=') rule.steps.sort((x, y) => y.v - x.v);
                    else rule.steps.sort((x, y) => x.v - y.v);
                });
            });
        });
    }
    buildScoringMatrix();

    // 單項精確查表
    function findScore(gender, ageGroup, itemName, val) {
        if (!val || isNaN(val) || val <= 0) return 0;
        
        // 映射：原始資料名稱 -> 換算表名稱
        const map = {
            "立定跳遠(cm)": "立定跳遠",
            "後拋擲遠(m)": "後拋擲遠",
            "折返跑(趟)": "折返跑",
            "菱形槓硬舉(公斤)": "菱形槓硬舉",
            "懸吊屈體(次)": "懸吊屈體",
            "懸吊屈體(秒)": "懸吊秒數",
            "六角槓負重行走(公斤)": "負重行走",
            "1500公尺跑步(秒)": "1500跑步"
        };
        const targetItem = map[itemName] || itemName;
        const g = gender === '女' ? '女' : '男';
        const a = g === '女' ? '不分年齡' : ageGroup;

        const ruleset = SCORING_ENGINE[g] && SCORING_ENGINE[g][a] ? SCORING_ENGINE[g][a][targetItem] : null;
        if (!ruleset) return 0;

        for (let step of ruleset.steps) {
            if (ruleset.op === ">=" && val >= step.v) return step.s;
            if (ruleset.op === "<=" && val <= step.v) return step.s;
        }
        return 0;
    }

    // ==========================================
    // UI 控制與 Excel 處理
    // ==========================================
    function showLoading(msg) { $('#loadingText').innerText = msg; $('#loading').classList.remove('hidden').classList.add('flex'); }
    function hideLoading() { $('#loading').classList.add('hidden'); }

    // 解決轉圈圈不動：使用非同步執行
    async function runAsync(msg, fn) {
        showLoading(msg);
        await new Promise(r => setTimeout(r, 100)); // 強制讓出主線程
        try { await fn(); } catch(e) { console.error(e); alert("錯誤: " + e.message); }
        finally { hideLoading(); }
    }

    // 1. 匯出範例
    async function exportTemplateExcel(bat) {
        await runAsync(`正在生成 ${bat} 範例...`, async () => {
            const wb = new ExcelJS.Workbook();
            const ws = wb.addWorksheet('填報表');
            ws.columns = [
                {header:'項次', width:6}, {header:'大隊', width:12}, {header:'單位', width:18}, {header:'姓名', width:12},
                {header:'性別', width:8}, {header:'年齡', width:8}, {header:'年齡層', width:12},
                {header:'立定跳遠(cm)', width:15}, {header:'後拋擲遠(m)', width:15}, {header:'折返跑(趟)', width:12},
                {header:'菱形槓硬舉(kg)', width:15}, {header:'懸吊(次)', width:10}, {header:'懸吊(秒)', width:10},
                {header:'負重行走(kg)', width:15}, {header:'跑步(秒)', width:15}
            ];
            ws.getRow(1).font = {bold:true, color:{argb:'FFFFFFFF'}};
            ws.getRow(1).fill = {type:'pattern', pattern:'solid', fgColor:{argb:'FF1E293B'}};

            const units = UNIT_LIST[bat] || [];
            units.forEach((u, i) => ws.addRow([i+1, bat, u, '', '', '', '']));

            const buffer = await wb.xlsx.writeBuffer();
            saveAs(new Blob([buffer]), `${bat}_測驗填報表.xlsx`);
        });
    }

    // 2. 匯入換算
    async function handleFileImport(input) {
        const file = input.files[0];
        if(!file) return;
        await runAsync("讀取 Excel 並執行 1,600 人階梯換算...", async () => {
            const wb = new ExcelJS.Workbook();
            await wb.xlsx.load(file);
            const ws = wb.worksheets[0];
            const data = [];

            ws.eachRow((row, rowNumber) => {
                if (rowNumber === 1) return;
                let r = {
                    bat: row.getCell(2).value || '',
                    unit: row.getCell(3).value || '',
                    name: row.getCell(4).value || '',
                    gender: row.getCell(5).value || '男',
                    age: parseInt(row.getCell(6).value) || 0,
                    ageGrp: row.getCell(7).value || '30-39',
                    vJump: parseFloat(row.getCell(8).value) || 0,
                    vThrow: parseFloat(row.getCell(9).value) || 0,
                    vShuttle: parseFloat(row.getCell(10).value) || 0,
                    vDead: parseFloat(row.getCell(11).value) || 0,
                    vHangR: parseFloat(row.getCell(12).value) || 0,
                    vHangS: parseFloat(row.getCell(13).value) || 0,
                    vCarry: parseFloat(row.getCell(14).value) || 0,
                    vRun: parseFloat(row.getCell(15).value) || 0
                };

                // Typo 校正
                if(r.vThrow > 30) r.vThrow /= 10;
                if(r.vDead > 500) r.vDead /= 10;

                // 換算分數
                r.sJump = findScore(r.gender, r.ageGrp, "立定跳遠(cm)", r.vJump);
                r.sThrow = findScore(r.gender, r.ageGrp, "後拋擲遠(m)", r.vThrow);
                r.sShuttle = findScore(r.gender, r.ageGrp, "折返跑(趟)", r.vShuttle);
                r.sDead = findScore(r.gender, r.ageGrp, "菱形槓硬舉(公斤)", r.vDead);
                r.sCarry = findScore(r.gender, r.ageGrp, "六角槓負重行走(公斤)", r.vCarry);
                r.sRun = findScore(r.gender, r.ageGrp, "1500公尺跑步(秒)", r.vRun === 0 ? 9999 : r.vRun);
                
                // 懸吊擇優
                let hR = findScore(r.gender, r.ageGrp, "懸吊屈體(次)", r.vHangR);
                let hS = findScore(r.gender, r.ageGrp, "懸吊屈體(秒)", r.vHangS);
                r.sHangMax = Math.max(hR, hS);

                r.total = r.sJump + r.sThrow + r.sShuttle + r.sDead + r.sCarry + r.sRun + r.sHangMax;
                r.grade = r.total >= 60 ? "及格" : "不及格";
                r.isErr = r.age > 70 || (r.vRun === 0 && r.vJump === 0);
                data.push(r);
            });

            masterData = data;
            renderTable();
            updateStats();
            $('#btnExpFull').disabled = false;
        });
        input.value = "";
    }

    function renderTable() {
        const body = $('#tableBody'); body.innerHTML = "";
        const search = $('#searchInput').value.toLowerCase();
        const filtered = masterData.filter(d => {
            const mBat = currentBat === 'ALL' || d.bat === currentBat;
            const mErr = currentBat === 'ERR' ? d.isErr : true;
            const mSearch = d.name.includes(search) || d.unit.includes(search);
            return mBat && mErr && mSearch;
        });

        filtered.slice(0, 100).forEach((r, i) => {
            const tr = document.createElement('tr');
            if(r.isErr) tr.classList.add('error-row');
            tr.innerHTML = `
                <td>${i+1}</td><td>${r.bat}</td><td>${r.unit}</td><td class="font-bold text-blue-700">${r.name}</td><td>${r.ageGrp}</td>
                <td class="font-black text-blue-900 bg-blue-50 text-lg">${r.total}</td>
                <td class="bg-blue-50 font-bold ${r.grade==='及格'?'text-emerald-600':'text-rose-600'}">${r.grade}</td>
                <td>${r.sJump}</td><td>${r.sThrow}</td><td>${r.sShuttle}</td><td>${r.sDead}</td>
                <td class="bg-amber-50 font-bold text-amber-800">${r.sHangMax}</td>
                <td>${r.sCarry}</td><td>${r.sRun}</td>
            `;
            body.appendChild(tr);
        });
    }

    function changeBatTab(bat) {
        currentBat = bat;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        $(`#tab-${bat}`).classList.add('active');
        renderTable();
    }

    function updateStats() {
        $('#statTotal').innerText = masterData.length;
        $('#statPass').innerText = masterData.filter(d => d.grade==='及格').length;
    }

    // 3. 匯出結果
    async function exportCalculatedExcel() {
        await runAsync("封裝正式成績大表 Excel...", async () => {
            const wb = new ExcelJS.Workbook();
            const ws = wb.addWorksheet('換算結果總表');
            ws.columns = [
                {header:'大隊', key:'bat', width:12}, {header:'單位', key:'unit', width:15}, {header:'姓名', key:'name', width:12},
                {header:'年齡層', key:'ageGrp', width:12}, {header:'總分', key:'total', width:10}, {header:'判定', key:'grade', width:10},
                {header:'跳遠分', key:'sJump'}, {header:'後拋分', key:'sThrow'}, {header:'折返分', key:'sShuttle'},
                {header:'硬舉分', key:'sDead'}, {header:'懸吊分', key:'sHangMax'}, {header:'負重分', key:'sCarry'}, {header:'跑步分', key:'sRun'}
            ];
            masterData.forEach(r => ws.addRow(r));
            const buf = await wb.xlsx.writeBuffer();
            saveAs(new Blob([buf]), `114年體能測驗換算結果_${new Date().getTime()}.xlsx`);
        });
    }
