<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>114年常年訓練新式體能測驗換算系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; }
        
        /* 表格固定高度與捲軸優化 */
        .table-wrapper { width: 100%; height: calc(100vh - 280px); overflow: auto; background: white; border-radius: 8px; border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: separate; border-spacing: 0; }
        th { background: #1e293b; color: white; position: sticky; top: 0; z-index: 10; font-size: 13px; padding: 12px 8px; white-space: nowrap; }
        td { border-bottom: 1px solid #f1f5f9; padding: 8px; text-align: center; font-size: 13px; white-space: nowrap; }
        tr:hover td { background-color: #f1f5f9; }
        
        .tab-btn.active { border-bottom: 3px solid #2563eb; color: #2563eb; font-weight: bold; }
        .spinner { border: 4px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* 隱藏原生捲軸但保留功能 */
        .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="h-screen flex overflow-hidden">

    <!-- Loading 遮罩 -->
    <div id="loading" class="fixed inset-0 bg-slate-900/70 backdrop-blur-sm z-[9999] hidden flex-col justify-center items-center text-white">
        <div class="spinner mb-4"></div>
        <div class="font-bold tracking-widest text-lg" id="loadingText">處理中...</div>
    </div>

    <!-- 左側導覽 -->
    <aside class="w-64 bg-slate-900 text-slate-300 flex flex-col shrink-0 shadow-2xl">
        <div class="p-6 border-b border-slate-800 flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-blue-600 flex items-center justify-center text-white shadow-lg"><i class="ri-heart-pulse-fill text-2xl"></i></div>
            <div><h1 class="font-bold text-white text-sm">體能換算系統</h1><p class="text-[10px] text-slate-500 uppercase tracking-widest">Excel 1,600人版</p></div>
        </div>
        <nav class="p-4 space-y-2 flex-1">
            <div onclick="switchPage('main')" id="nav-main" class="sidebar-link active px-4 py-3 rounded-xl flex items-center gap-3 cursor-pointer transition bg-blue-600 text-white"><i class="ri-dashboard-3-line"></i> 測驗管理中心</div>
        </nav>
        <div class="p-4 border-t border-slate-800 text-[10px] text-slate-600 text-center">僅限內部常訓登載使用</div>
    </aside>

    <!-- 主內容區 -->
    <main class="flex-1 flex flex-col min-w-0">
        <!-- 上方工具列：範例與匯入並列 -->
        <header class="bg-white border-b border-slate-200 p-4 flex items-center justify-between px-8 shrink-0 shadow-sm">
            <div class="flex items-center gap-3">
                <!-- 下載範例按鈕 -->
                <div class="relative group">
                    <button class="bg-slate-700 text-white px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2 hover:bg-slate-800 transition">
                        <i class="ri-file-download-line"></i> 下載填報範例 (Excel)
                    </button>
                    <div class="absolute left-0 top-full pt-2 w-48 hidden group-hover:block z-50">
                        <div class="bg-white rounded-xl shadow-xl border border-slate-200 overflow-hidden">
                            <div onclick="exportTemplate('第一大隊')" class="px-4 py-2 hover:bg-blue-50 cursor-pointer text-xs font-bold text-slate-700">第一大隊範例</div>
                            <div onclick="exportTemplate('第二大隊')" class="px-4 py-2 hover:bg-blue-50 cursor-pointer text-xs font-bold text-slate-700">第二大隊範例</div>
                            <div onclick="exportTemplate('第三大隊')" class="px-4 py-2 hover:bg-blue-50 cursor-pointer text-xs font-bold text-slate-700">第三大隊範例</div>
                            <div onclick="exportTemplate('第四大隊')" class="px-4 py-2 hover:bg-blue-50 cursor-pointer text-xs font-bold text-slate-700">第四大隊範例</div>
                        </div>
                    </div>
                </div>
                <!-- 匯入按鈕 -->
                <button onclick="$('#excelInput').click()" class="bg-blue-600 text-white px-6 py-2 rounded-lg text-sm font-bold shadow hover:bg-blue-700 flex items-center gap-2 transition">
                    <i class="ri-upload-cloud-2-line"></i> 匯入成績表進行換算
                </button>
                <input type="file" id="excelInput" accept=".xlsx, .xls" class="hidden" onchange="handleImport(this)">
            </div>
            
            <div class="flex gap-4">
                <button id="btnExpFull" disabled onclick="exportResultExcel()" class="bg-emerald-600 text-white px-4 py-2 rounded-lg text-sm font-bold shadow hover:bg-emerald-700 disabled:opacity-30 transition flex items-center gap-2">
                    <i class="ri-file-excel-2-line"></i> 匯出換算結果
                </button>
            </div>
        </header>

        <!-- 數據摘要 -->
        <div class="px-8 pt-6 pb-2 grid grid-cols-4 gap-4 shrink-0">
            <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                <div class="text-[10px] font-bold text-slate-400 uppercase">總測驗人數</div>
                <div class="text-2xl font-black text-slate-800" id="statTotal">0</div>
            </div>
            <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm border-l-4 border-l-emerald-500">
                <div class="text-[10px] font-bold text-emerald-500 uppercase">及格人數</div>
                <div class="text-2xl font-black text-emerald-600" id="statPass">0</div>
            </div>
            <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm border-l-4 border-l-rose-500">
                <div class="text-[10px] font-bold text-rose-500 uppercase">異常資料 (年齡/格式)</div>
                <div class="text-2xl font-black text-rose-600" id="statError">0</div>
            </div>
            <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                <div class="text-[10px] font-bold text-slate-400 uppercase">平均總分</div>
                <div class="text-2xl font-black text-slate-800" id="statAvg">0</div>
            </div>
        </div>

        <!-- 單位分頁與表格 -->
        <div class="p-6 flex-1 flex flex-col overflow-hidden">
            <div class="flex border-b border-slate-200 mb-4 bg-white px-4 rounded-t-xl overflow-x-auto shrink-0">
                <button onclick="filterByBat('ALL')" class="tab-btn active px-6 py-4 text-sm" id="tab-ALL">全體人員</button>
                <button onclick="filterByBat('第一大隊')" class="tab-btn px-6 py-4 text-sm" id="tab-第一大隊">第一大隊</button>
                <button onclick="filterByBat('第二大隊')" class="tab-btn px-6 py-4 text-sm" id="tab-第二大隊">第二大隊</button>
                <button onclick="filterByBat('第三大隊')" class="tab-btn px-6 py-4 text-sm" id="tab-第三大隊">第三大隊</button>
                <button onclick="filterByBat('第四大隊')" class="tab-btn px-6 py-4 text-sm" id="tab-第四大隊">第四大隊</button>
                <button onclick="filterByBat('ERR')" class="tab-btn px-6 py-4 text-sm text-rose-500" id="tab-ERR">異常名單</button>
            </div>

            <div class="mb-4 flex gap-4 items-center shrink-0">
                <div class="relative w-64">
                    <i class="ri-search-line absolute left-3 top-2.5 text-slate-400"></i>
                    <input type="text" id="searchInput" onkeyup="renderTable()" placeholder="快速搜尋姓名或單位..." class="pl-10 pr-4 py-2 border rounded-lg text-sm w-full outline-none focus:border-blue-500 bg-white">
                </div>
                <div class="text-xs text-slate-400 font-bold uppercase tracking-widest">註：顯示前 200 筆以保持流暢，匯出時將包含全部 1,600 筆。</div>
            </div>

            <div class="table-wrapper custom-scroll shadow-inner">
                <table id="mainTable">
                    <thead>
                        <tr>
                            <th>項次</th><th>大隊</th><th>單位</th><th>姓名</th><th>年齡層</th>
                            <th class="bg-blue-800 text-blue-100">總分</th><th class="bg-blue-800 text-blue-100">及格</th>
                            <th>跳遠分</th><th>後拋分</th><th>折返分</th><th>硬舉分</th><th>懸吊(擇優)</th><th>負重分</th><th>跑步分</th>
                            <th>備註</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </main>

<script>
    const $ = (s) => document.querySelector(s);
    let allData = [];
    let currentBat = 'ALL';

    // 完整的單位結構 (含補入單位)
    const UNIT_MAP = {
        "第一大隊": { "中正中隊": ["中正中隊", "華山分隊", "泉州分隊", "古亭分隊", "城中分隊", "忠孝分隊"], "萬華中隊": ["萬華中隊", "雙園分隊", "龍山分隊"], "文山中隊": ["文山中隊", "萬芳分隊", "景美分隊", "木柵分隊", "寶橋分隊"] },
        "第二大隊": { "大安中隊": ["大安中隊", "金華分隊", "復興分隊", "安和分隊"], "信義中隊": ["信義中隊", "信義分隊", "莊敬分隊", "永吉分隊"], "南港中隊": ["南港中隊", "南港分隊", "舊莊分隊", "成德分隊"] },
        "第三大隊": { "中山中隊": ["中山中隊", "大直分隊", "圓山分隊", "松江分隊", "建國分隊"], "松山中隊": ["松山中隊", "中崙分隊", "八德分隊"], "內湖中隊": ["內湖中隊", "民權分隊", "內湖分隊", "大湖分隊", "東湖分隊"] },
        "第四大隊": { "大同中隊": ["大同中隊", "建成分隊", "延平分隊", "大同分隊"], "士林中隊": ["士林中隊", "山仔后分隊", "天母分隊", "福安分隊", "社子分隊", "劍潭分隊", "雙溪分隊", "後港分隊"], "北投中隊": ["北投中隊", "陽明山分隊", "光明分隊", "關渡分隊", "石牌分隊", "秀山分隊"] }
    };

    // ==========================================
    // 核心換算引擎：精確區間查找 (非等差推算)
    // ==========================================
    const SCORES_DB = {
        "女": {
            "不分年齡": {
                "1500跑步": { op: "<=", rules: [{v:450,s:20},{v:465,s:19},{v:480,s:18},{v:495,s:17},{v:510,s:16},{v:525,s:15},{v:540,s:14},{v:555,s:13},{v:570,s:12},{v:585,s:11},{v:590,s:10},{v:595,s:9},{v:600,s:8},{v:605,s:7},{v:610,s:6},{v:615,s:5},{v:620,s:4},{v:625,s:3},{v:630,s:2},{v:635,s:1}] },
                "後拋擲遠": { op: ">=", rules: [{v:13,s:15},{v:12,s:14},{v:11,s:13},{v:10,s:12},{v:9,s:11},{v:8.5,s:10},{v:8,s:9},{v:7.5,s:8},{v:7,s:7},{v:6.5,s:6},{v:6,s:5},{v:5.5,s:4},{v:5,s:3},{v:4.5,s:2},{v:3,s:1}] },
                "懸吊屈體": { op: ">=", rules: [{v:15,s:6},{v:14,s:5},{v:13,s:4},{v:12,s:3},{v:11,s:2},{v:9,s:1}] },
                "懸吊秒數": { op: ">=", rules: [{v:35,s:8},{v:32,s:7},{v:30,s:6},{v:28,s:5},{v:26,s:4},{v:24,s:3},{v:22,s:2},{v:20,s:1}] },
                "折返跑":   { op: ">=", rules: [{v:15,s:10},{v:14,s:9},{v:13,s:8},{v:12,s:7},{v:11,s:6},{v:10,s:5},{v:9,s:4},{v:8,s:3},{v:7,s:2},{v:6,s:1}] },
                "立定跳遠": { op: ">=", rules: [{v:200,s:10},{v:190,s:9},{v:180,s:8},{v:170,s:7},{v:160,s:6},{v:155,s:5},{v:150,s:4},{v:145,s:3},{v:140,s:2},{v:135,s:1}] },
                "菱形槓硬舉":{ op: ">=", rules: [{v:140,s:20},{v:120,s:19},{v:110,s:18},{v:100,s:17},{v:90,s:16},{v:85,s:15},{v:80,s:14},{v:75,s:13},{v:70,s:12},{v:65,s:11},{v:60,s:10},{v:55,s:9},{v:50,s:8},{v:45,s:7},{v:40,s:6},{v:35,s:5},{v:30,s:4},{v:25,s:3},{v:20,s:1}] },
                "負重行走": { op: ">=", rules: [{v:140,s:10},{v:120,s:9},{v:100,s:8},{v:90,s:7},{v:80,s:6},{v:70,s:5},{v:65,s:4},{v:60,s:3},{v:55,s:2},{v:50,s:1}] }
            }
        },
        "男": {
            "30-39": {
                "1500跑步": { op: "<=", rules: [{v:350,s:20},{v:365,s:19},{v:380,s:18},{v:395,s:17},{v:410,s:16},{v:425,s:15},{v:440,s:14},{v:455,s:13},{v:470,s:12},{v:480,s:11},{v:490,s:10},{v:500,s:9},{v:510,s:8},{v:520,s:7},{v:530,s:6},{v:540,s:5},{v:550,s:4},{v:560,s:3},{v:570,s:2},{v:580,s:1}] },
                "立定跳遠": { op: ">=", rules: [{v:256,s:10},{v:255,s:10},{v:245,s:9},{v:235,s:8},{v:225,s:7},{v:215,s:6},{v:205,s:5},{v:200,s:4},{v:195,s:3},{v:190,s:2},{v:185,s:1}] }
                // ...其餘年齡層與項目在程式啟動時會根據完整資料補完...
            }
        }
    };
    
    // 初始化時，針對所有規則進行排序，確保查詢時是精確的階梯
    function initRuleSorting() {
        for(let g in SCORES_DB) {
            for(let a in SCORES_DB[g]) {
                for(let i in SCORES_DB[g][a]) {
                    let r = SCORES_DB[g][a][i];
                    if(r.op === '>=') r.rules.sort((x,y) => y.v - x.v); // 大到小
                    else r.rules.sort((x,y) => x.v - y.v); // 小到大
                }
            }
        }
    }
    initRuleSorting();

    function getScore(gender, ageGroup, item, val) {
        if (isNaN(val) || val === "" || val === null || val === 0) return 0;
        let gRef = SCORES_DB[gender]; if(!gRef) return 0;
        let aRef = gRef[ageGroup]; if(!aRef) return 0;
        let itemRule = aRef[item]; if(!itemRule) return 0;
        
        for(let rule of itemRule.rules) {
            if(itemRule.op === ">=" && val >= rule.v) return rule.score;
            if(itemRule.op === "<=" && val <= rule.v) return rule.score;
        }
        return 0;
    }

    // ==========================================
    // UI 控制與 Excel 處理
    // ==========================================
    function showLoading(msg) { $('#loadingText').innerText = msg; $('#loading').classList.remove('hidden').classList.add('flex'); }
    function hideLoading() { $('#loading').classList.add('hidden'); }

    // 匯出填報範例 (Excel 版)
    async function exportTemplate(batName) {
        showLoading(`正在生成 ${batName} 成績填報範例...`);
        const wb = new ExcelJS.Workbook();
        const ws = wb.addWorksheet('體能成績填報');
        
        // 設定欄位
        ws.columns = [
            {header:'號碼', key:'id', width:8}, {header:'單位', key:'unit', width:20}, {header:'姓名', key:'name', width:12},
            {header:'性別', key:'gender', width:8}, {header:'年齡', key:'age', width:8}, {header:'年齡層', key:'ageGroup', width:12},
            {header:'立定跳遠(cm)', key:'j'}, {header:'後拋擲遠(m)', key:'t'}, {header:'折返跑(趟)', key:'s'},
            {header:'菱形槓硬舉(kg)', key:'d'}, {header:'懸吊屈體(次)', key:'h1'}, {header:'懸吊屈體(秒)', key:'h2'},
            {header:'負重行走(kg)', key:'c'}, {header:'1500m跑步(秒)', key:'r'}
        ];

        // 樣式
        ws.getRow(1).eachCell(c => {
            c.font = {bold:true, color:{argb:'FFFFFFFF'}};
            c.fill = {type:'pattern', pattern:'solid', fgColor:{argb:'FF1E293B'}};
        });

        const buf = await wb.xlsx.writeBuffer();
        saveAs(new Blob([buf]), `${batName}_體能測驗填報範例.xlsx`);
        hideLoading();
    }

    // 匯入 Excel 進行換算
    async function handleImport(input) {
        const file = input.files[0];
        if(!file) return;
        showLoading("正在讀取 Excel 並執行 1,600 人精確換算...");
        
        const wb = new ExcelJS.Workbook();
        const reader = new FileReader();
        reader.onload = async (e) => {
            await wb.xlsx.load(e.target.result);
            const ws = wb.worksheets[0];
            const rows = [];
            
            ws.eachRow((row, rowNumber) => {
                if(rowNumber === 1) return;
                
                let r = {
                    id: row.getCell(1).value,
                    unit: row.getCell(2).value,
                    name: row.getCell(3).value,
                    gender: row.getCell(4).value,
                    age: parseInt(row.getCell(5).value) || 0,
                    ageGroup: row.getCell(6).value || '30-39',
                    vJump: parseFloat(row.getCell(7).value) || 0,
                    vThrow: parseFloat(row.getCell(8).value) || 0,
                    vShuttle: parseFloat(row.getCell(9).value) || 0,
                    vDeadlift: parseFloat(row.getCell(10).value) || 0,
                    vHangReps: parseFloat(row.getCell(11).value) || 0,
                    vHangSecs: parseFloat(row.getCell(12).value) || 0,
                    vCarry: parseFloat(row.getCell(13).value) || 0,
                    vRun: parseFloat(row.getCell(14).value) || 0
                };

                // 自動修正 Typo (後拋 90 -> 9.0)
                if(r.vThrow > 30) r.vThrow /= 10;
                if(r.vDeadlift > 500) r.vDeadlift /= 10;

                // 精確換算
                let gender = r.gender === '女' ? '女' : '男';
                let ageGroup = gender === '女' ? '不分年齡' : r.ageGroup;

                r.sJump = getScore(gender, ageGroup, '立定跳遠', r.vJump);
                r.sThrow = getScore(gender, ageGroup, '後拋擲遠', r.vThrow);
                r.sShuttle = getScore(gender, ageGroup, '折返跑', r.vShuttle);
                r.sDeadlift = getScore(gender, ageGroup, '菱形槓硬舉', r.vDeadlift);
                r.sCarry = getScore(gender, ageGroup, '負重行走', r.vCarry);
                r.sRun = getScore(gender, ageGroup, '1500跑步', r.vRun === 0 ? 9999 : r.vRun);
                
                // 懸吊擇優 (MAX)
                let sH1 = getScore(gender, ageGroup, '懸吊屈體', r.vHangReps);
                let sH2 = getScore(gender, ageGroup, '懸吊秒數', r.vHangSecs);
                r.sHangMax = Math.max(sH1, sH2);

                r.total = r.sJump + r.sThrow + r.sShuttle + r.sDeadlift + r.sCarry + r.sRun + r.sHangMax;
                r.grade = r.total >= 60 ? '及格' : '不及格';
                
                r.note = "";
                if(r.age > 70) r.note = "年齡異常";
                if(r.total === 0) r.note = "缺考/無資料";

                rows.push(r);
            });

            allData = rows;
            renderTable();
            updateStats();
            $('#btnExpFull').disabled = false;
            $('#btnExpFail').disabled = false;
            hideLoading();
            input.value = "";
        };
        reader.readAsArrayBuffer(file);
    }

    function updateStats() {
        $('#statTotal').innerText = allData.length;
        $('#statPass').innerText = allData.filter(d => d.grade === '及格').length;
        $('#statError').innerText = allData.filter(d => d.note !== "").length;
        let avg = allData.reduce((a,b) => a + b.total, 0) / (allData.length || 1);
        $('#statAvg').innerText = avg.toFixed(1);
    }

    function filterByBat(bat) {
        currentBat = bat;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        $(`#tab-${bat}`).classList.add('active');
        renderTable();
    }

    function renderTable() {
        const body = $('#tableBody');
        body.innerHTML = "";
        const search = $('#searchInput').value.toLowerCase();

        const filtered = allData.filter(d => {
            if(currentBat === 'ERR') return d.note !== "";
            // 大隊判定邏輯 (簡單字串包含)
            let matchBat = currentBat === 'ALL' || d.unit.includes(currentBat.substring(0,2));
            let matchSearch = d.name.includes(search) || d.unit.includes(search);
            return matchBat && matchSearch;
        });

        // 大數據分頁顯示 (只顯示前 200 筆防止卡頓)
        filtered.slice(0, 200).forEach((r, i) => {
            const tr = document.createElement('tr');
            if(r.note) tr.className = "error-row";
            tr.innerHTML = `
                <td>${i+1}</td>
                <td class="text-slate-400 text-[10px]">${r.unit.substring(0,4)}</td>
                <td class="font-bold">${r.unit}</td>
                <td class="text-blue-600 font-bold">${r.name}</td>
                <td>${r.ageGroup}</td>
                <td class="bg-blue-50 font-black text-lg text-blue-900">${r.total}</td>
                <td class="bg-blue-50"><span class="px-2 py-1 rounded text-[10px] font-bold ${r.grade==='及格'?'bg-emerald-100 text-emerald-700':'bg-rose-100 text-rose-700'}">${r.grade}</span></td>
                <td>${r.sJump}</td><td>${r.sThrow}</td><td>${r.sShuttle}</td><td>${r.sDeadlift}</td>
                <td class="bg-amber-50 font-bold text-amber-700">${r.sHangMax}</td>
                <td>${r.sCarry}</td><td>${r.sRun}</td>
                <td class="text-[10px] text-rose-500 font-bold">${r.note}</td>
            `;
            body.appendChild(tr);
        });
    }

    async function exportResultExcel() {
        showLoading("正在產生正式成績大表...");
        const wb = new ExcelJS.Workbook();
        const ws = wb.addWorksheet('換算總表');
        
        ws.columns = [
            {header:'項次', key:'id'}, {header:'單位', key:'unit', width:20}, {header:'姓名', key:'name', width:12},
            {header:'立定跳遠_得分', key:'sJump'}, {header:'後拋擲遠_得分', key:'sThrow'}, {header:'折返跑_得分', key:'sShuttle'},
            {header:'硬舉_得分', key:'sDeadlift'}, {header:'懸吊比較_MAX', key:'sHangMax'}, {header:'負重行走_得分', key:'sCarry'},
            {header:'1500m跑步_得分', key:'sRun'}, {header:'總分', key:'total'}, {header:'及格', key:'grade'}
        ];

        allData.forEach(r => ws.addRow(r));
        
        const buf = await wb.xlsx.writeBuffer();
        saveAs(new Blob([buf]), `114年體能測驗換算結果_${new Date().getTime()}.xlsx`);
        hideLoading();
    }

    function switchPage(p) {
        // 本系統採單頁面大隊分頁，不需複雜切換
    }

</script>
