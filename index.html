    function initEngine() {
        const rows = Papa.parse(RULES_CSV.trim(), {header:true}).data;
        rows.forEach(r => {
            const k = `${r.性別}_${r.年齡層}_${r.項目}`;
            if(!SCORING_ENGINE[k]) SCORING_ENGINE[k] = { op: r.比較方式, steps: [] };
            SCORING_ENGINE[k].steps.push({ v: parseFloat(r.值), s: parseInt(r.得分) });
        });
        // 排序：>= 由大到小；<= 由小到大
        for(let k in SCORING_ENGINE) {
            let e = SCORING_ENGINE[k];
            if(e.op === '>=') e.steps.sort((a,b) => b.v - a.v);
            else e.steps.sort((a,b) => a.v - b.v);
        }
    }
    initEngine();

    function lookup(val, gender, ageGrp, item) {
        if(!val || isNaN(val) || val <= 0) return 0;
        const g = gender === '女' ? '女' : '男';
        const a = g === '女' ? '不分年齡' : ageGrp;
        const rule = SCORING_ENGINE[`${g}_${a}_${item}`];
        if(!rule) return 0;
        for(let step of rule.steps) {
            if(rule.op === '>=' && val >= step.v) return step.s;
            if(rule.op === '<=' && val <= step.v) return step.s;
        }
        return 0;
    }

    // ==========================================
    // 2. 非同步 UI 與 Excel 處理 (解決轉圈圈)
    // ==========================================
    async function runWithLoading(msg, fn) {
        $('#loadingText').innerText = msg;
        $('#loading').classList.remove('hidden').classList.add('flex');
        await new Promise(r => setTimeout(r, 100)); 
        try { await fn(); } catch(e) { console.error(e); alert("執行出錯"); }
        finally { $('#loading').classList.add('hidden'); }
    }

    // 匯出範例
    async function exportTemplateExcel(bat) {
        await runWithLoading(`正在生成 ${bat} 範例 Excel...`, async () => {
            const wb = new ExcelJS.Workbook();
            const ws = wb.addWorksheet('填報單');
            ws.columns = [
                {header:'項次', width:6}, {header:'大隊', width:12}, {header:'單位', width:18}, {header:'姓名', width:12},
                {header:'性別', width:8}, {header:'年齡層', width:12},
                {header:'跳遠(cm)', width:10}, {header:'後拋(m)', width:10}, {header:'折返(趟)', width:10},
                {header:'硬舉(kg)', width:10}, {header:'懸吊(次)', width:10}, {header:'懸吊(秒)', width:10},
                {header:'負重(kg)', width:10}, {header:'跑步(秒)', width:10}
            ];
            ws.getRow(1).font = {bold:true, color:{argb:'FFFFFFFF'}};
            ws.getRow(1).fill = {type:'pattern', pattern:'solid', fgColor:{argb:'FF1E293B'}};

            const list = UNIT_LIST[bat] || [];
            list.forEach((u, i) => ws.addRow([i+1, bat, u, '', '男', '30-39']));

            const buffer = await wb.xlsx.writeBuffer();
            saveAs(new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' }), `${bat}_測驗填報範例.xlsx`);
        });
    }

    // 匯入換算
    async function handleImport(input) {
        const file = input.files[0];
        if(!file) return;
        await runWithLoading("正在執行 1,600 人交叉換算...", async () => {
            const wb = new ExcelJS.Workbook();
            await wb.xlsx.load(file);
            const ws = wb.worksheets[0];
            const data = [];

            ws.eachRow((row, rowNumber) => {
                if(rowNumber === 1) return;
                const get = (idx) => row.getCell(idx).value;
                let r = {
                    bat: get(2)||'', unit: get(3)||'', name: get(4)||'', gender: get(5)||'男', ageGrp: get(6)||'30-39',
                    vJ: parseFloat(get(7))||0, vT: parseFloat(get(8))||0, vS: parseFloat(get(9))||0,
                    vD: parseFloat(get(10))||0, vH1: parseFloat(get(11))||0, vH2: parseFloat(get(12))||0,
                    vC: parseFloat(get(13))||0, vR: parseFloat(get(14))||0
                };
                
                // 髒資料修正 (Typo修正)
                if(r.vT > 30) r.vT /= 10;
                if(r.vD > 500) r.vD /= 10;

                // 查表換算
                r.sJ = lookup(r.vJ, r.gender, r.ageGrp, '立定跳遠');
                r.sT = lookup(r.vT, r.gender, r.ageGrp, '後拋擲遠');
                r.sS = lookup(r.vS, r.gender, r.ageGrp, '折返跑');
                r.sD = lookup(r.vD, r.gender, r.ageGrp, '菱形槓硬舉');
                r.sC = lookup(r.vC, r.gender, r.ageGrp, '負重行走');
                r.sR = lookup(r.vR||9999, r.gender, r.ageGrp, '1500跑步');
                
                // 懸吊擇優
                r.sH = Math.max(lookup(r.vH1, r.gender, r.ageGrp, '懸吊屈體'), lookup(r.vH2, r.gender, r.ageGrp, '懸吊秒數'));

                r.total = r.sJ + r.sT + r.sS + r.sD + r.sC + r.sR + r.sH;
                r.grade = r.total >= 60 ? '及格' : '不及格';
                r.isErr = r.vR === 0 && r.vJ === 0;
                data.push(r);
            });

            allData = data;
            renderTable();
            updateStats();
            $('#btnExport').disabled = false;
            input.value = "";
        });
    }

    function renderTable() {
        const body = $('#tableBody'); body.innerHTML = "";
        const search = $('#searchInput').value.toLowerCase();
        const filtered = allData.filter(d => {
            const mBat = currentBat === 'ALL' || d.bat === currentBat;
            const mErr = currentBat === 'ERR' ? d.isErr : true;
            return mBat && mErr && (d.name.includes(search) || d.unit.includes(search));
        });

        filtered.slice(0, 150).forEach((r, i) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${i+1}</td><td>${r.bat}</td><td>${r.unit}</td><td class="font-bold text-blue-700">${r.name}</td><td>${r.ageGrp}</td>
                <td class="font-black text-blue-900 bg-blue-50 text-lg">${r.total}</td>
                <td><span class="px-2 py-0.5 rounded font-bold text-[10px] ${r.grade==='及格'?'bg-emerald-100 text-emerald-700':'bg-rose-100 text-rose-700'}">${r.grade}</span></td>
                <td>${r.sJ}</td><td>${r.sT}</td><td>${r.sS}</td><td>${r.sD}</td><td class="bg-amber-50 font-bold">${r.sH}</td><td>${r.sC}</td><td>${r.sR}</td><td>${r.isErr?'缺考':''}</td>
            `;
            body.appendChild(tr);
        });
    }

    function changeBat(bat) {
        currentBat = bat;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        $(`#tab-${bat}`).classList.add('active');
        renderTable();
    }

    function updateStats() {
        $('#statTotal').innerText = allData.length;
        $('#statPass').innerText = allData.filter(d => d.grade==='及格').length;
        $('#statError').innerText = allData.filter(d => d.isErr).length;
    }

    async function exportResultExcel() {
        await runAsync("正在封裝 1,600 人成績換算大表...", async () => {
            const wb = new ExcelJS.Workbook();
            const ws = wb.addWorksheet('換算總表');
            ws.columns = [
                {header:'大隊', key:'bat', width:12}, {header:'單位', key:'unit', width:15}, {header:'姓名', key:'name', width:12},
                {header:'總分', key:'total'}, {header:'及格判定', key:'grade'},
                {header:'跳遠分', key:'sJ'}, {header:'後拋分', key:'sT'}, {header:'折返分', key:'sS'},
                {header:'硬舉分', key:'sD'}, {header:'懸吊分', key:'sH'}, {header:'負重分', key:'sC'}, {header:'跑步分', key:'sR'}
            ];
            allData.forEach(r => ws.addRow(r));
            const buffer = await wb.xlsx.writeBuffer();
            saveAs(new Blob([buffer]), `114年體測換算成績單_${new Date().getTime()}.xlsx`);
        });
    }
</script>
</body>
</html>
