<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>114年體能測驗換算系統 (CSV版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; overflow: hidden; }
        .table-wrapper { height: calc(100vh - 240px); overflow: auto; background: white; border-radius: 12px; border: 1px solid #e2e8f0; }
        th { background: #1e293b; color: white; position: sticky; top: 0; z-index: 10; font-size: 13px; padding: 12px 8px; white-space: nowrap; }
        td { border-bottom: 1px solid #f1f5f9; padding: 10px 8px; text-align: center; font-size: 13px; white-space: nowrap; }
        .tab-btn.active { border-bottom: 4px solid #2563eb; color: #2563eb; font-weight: bold; background: #eff6ff; }
        .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .error-row td { background-color: #fff1f2 !important; color: #be123c; }
    </style>
</head>
<body class="h-screen flex overflow-hidden">

    <!-- 左側導覽列 -->
    <aside class="w-64 bg-slate-900 text-slate-300 flex flex-col shrink-0 shadow-2xl">
        <div class="p-6 border-b border-slate-800 flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-blue-600 flex items-center justify-center text-white shadow-lg"><i class="ri-run-line text-2xl"></i></div>
            <div><h1 class="font-bold text-white text-sm">體能換算系統</h1><p class="text-[10px] text-slate-500 uppercase tracking-widest">1,600人高速處理</p></div>
        </div>
        <nav class="p-4 space-y-2 flex-1">
            <div class="bg-blue-600 text-white p-3 rounded-xl flex items-center gap-3 shadow-lg">
                <i class="ri-dashboard-3-line text-xl"></i>
                <span class="font-bold">換算管理中心</span>
            </div>
        </nav>
    </aside>

    <!-- 主內容區 -->
    <main class="flex-1 flex flex-col min-w-0">
        <!-- 頂部功能區 (並列配置) -->
        <header class="bg-white border-b border-slate-200 p-4 px-8 flex items-center justify-between shrink-0 shadow-sm">
            <div class="flex items-center gap-4">
                <!-- 1. 下載範例 -->
                <div class="relative group">
                    <button class="bg-slate-700 text-white px-5 py-2.5 rounded-lg text-sm font-bold flex items-center gap-2 hover:bg-black transition shadow-md">
                        <i class="ri-file-download-line text-lg"></i> 1. 下載填報範例 (CSV)
                    </button>
                    <div class="absolute left-0 top-full pt-2 w-48 hidden group-hover:block z-50">
                        <div class="bg-white rounded-xl shadow-2xl border border-slate-200 overflow-hidden p-1">
                            <div onclick="downloadSample('第一大隊')" class="px-4 py-2 hover:bg-blue-50 cursor-pointer text-xs font-bold text-slate-700 rounded mb-1">第一大隊範例</div>
                            <div onclick="downloadSample('第二大隊')" class="px-4 py-2 hover:bg-blue-50 cursor-pointer text-xs font-bold text-slate-700 rounded mb-1">第二大隊範例</div>
                            <div onclick="downloadSample('第三大隊')" class="px-4 py-2 hover:bg-blue-50 cursor-pointer text-xs font-bold text-slate-700 rounded mb-1">第三大隊範例</div>
                            <div onclick="downloadSample('第四大隊')" class="px-4 py-2 hover:bg-blue-50 cursor-pointer text-xs font-bold text-slate-700 rounded">第四大隊範例</div>
                        </div>
                    </div>
                </div>

                <!-- 2. 匯入換算 -->
                <button onclick="$('#fileInput').click()" class="bg-blue-600 text-white px-6 py-2.5 rounded-lg text-sm font-bold shadow-lg hover:bg-blue-700 flex items-center gap-2 active:scale-95 transition">
                    <i class="ri-upload-cloud-2-line text-lg"></i> 2. 匯入成績表進行換算
                </button>
                <input type="file" id="fileInput" accept=".csv" class="hidden" onchange="handleImport(this)">
            </div>

            <!-- 3. 匯出結果 -->
            <button id="btnExport" disabled onclick="exportResults()" class="bg-emerald-600 text-white px-5 py-2.5 rounded-lg text-sm font-bold shadow hover:bg-emerald-700 disabled:opacity-30 transition flex items-center gap-2">
                <i class="ri-file-excel-2-line text-lg"></i> 3. 匯出成績大表 (Excel可用)
            </button>
        </header>

        <div class="p-6 flex-1 flex flex-col overflow-hidden">
            <!-- 大隊 Tab 分頁 -->
            <div class="flex border-b border-slate-200 mb-4 px-4 overflow-x-auto shrink-0 gap-1 bg-white rounded-t-xl">
                <button onclick="changeBat('ALL')" class="tab-btn active px-6 py-4 text-sm" id="tab-ALL">全體人員</button>
                <button onclick="changeBat('第一大隊')" class="tab-btn px-6 py-4 text-sm" id="tab-第一大隊">第一大隊</button>
                <button onclick="changeBat('第二大隊')" class="tab-btn px-6 py-4 text-sm" id="tab-第二大隊">第二大隊</button>
                <button onclick="changeBat('第三大隊')" class="tab-btn px-6 py-4 text-sm" id="tab-第三大隊">第三大隊</button>
                <button onclick="changeBat('第四大隊')" class="tab-btn px-6 py-4 text-sm" id="tab-第四大隊">第四大隊</button>
                <button onclick="changeBat('ERR')" class="tab-btn px-6 py-4 text-sm text-rose-500" id="tab-ERR">異常偵測</button>
            </div>

            <div class="mb-4 flex items-center justify-between">
                <div class="relative w-80">
                    <i class="ri-search-line absolute left-3 top-2.5 text-slate-400"></i>
                    <input type="text" id="searchInput" onkeyup="renderTable()" placeholder="快速搜尋單位、姓名..." class="pl-10 pr-4 py-2 border rounded-lg text-sm w-full outline-none focus:border-blue-500 bg-white">
                </div>
                <div class="flex gap-4 text-xs font-bold text-slate-500">
                    <span id="statTotal">總計: 0 人</span> | <span class="text-emerald-600" id="statPass">及格: 0 人</span>
                </div>
            </div>

            <div class="table-wrapper custom-scroll shadow-inner">
                <table id="mainTable">
                    <thead>
                        <tr>
                            <th>項次</th><th>大隊</th><th>分隊</th><th>姓名</th><th>年齡</th>
                            <th class="bg-blue-800 text-white">總分</th><th class="bg-blue-800 text-white">及格判定</th>
                            <th>跳遠分</th><th>後拋分</th><th>折返分</th><th>硬舉分</th><th class="text-blue-600">懸吊(擇優)</th><th>負重分</th><th>跑步分</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="15" class="py-24 text-slate-300 italic">請下載範例填報後匯入 CSV 檔案</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

<script>
    const $ = (s) => document.querySelector(s);
    let masterData = []; 
    let currentBat = 'ALL';

    const UNIT_LIST = {
        "第一大隊": ["中正中隊", "華山分隊", "泉州分隊", "古亭分隊", "城中分隊", "忠孝分隊", "萬華中隊", "雙園分隊", "龍山分隊", "文山中隊", "萬芳分隊", "景美分隊", "木柵分隊", "寶橋分隊"],
        "第二大隊": ["大安中隊", "金華分隊", "復興分隊", "安和分隊", "信義中隊", "信義分隊", "莊敬分隊", "永吉分隊", "南港中隊", "南港分隊", "舊莊分隊", "成德分隊"],
        "第三大隊": ["中山中隊", "大直分隊", "圓山分隊", "松江分隊", "建國分隊", "松山中隊", "中崙分隊", "八德分隊", "內湖中隊", "民權分隊", "內湖分隊", "大湖分隊", "東湖分隊"],
        "第四大隊": ["大同中隊", "建成分隊", "延平分隊", "大同分隊", "士林中隊", "山仔后分隊", "天母分隊", "福安分隊", "社子分隊", "劍潭分隊", "雙溪分隊", "後港分隊", "北投中隊", "陽明山分隊", "光明分隊", "關渡分隊", "石牌分隊", "秀山分隊"]
    };

    // ==========================================
    // 精確換算引擎 (階梯查找法，絕無等差誤差)
    // ==========================================
    const RULES = {
        "女": {
            "不分年齡": {
                "run": { op: "<=", steps: [{v:450,s:20},{v:465,s:19},{v:480,s:18},{v:495,s:17},{v:510,s:16},{v:525,s:15},{v:540,s:14},{v:555,s:13},{v:570,s:12},{v:585,s:11},{v:590,s:10},{v:595,s:9},{v:600,s:8},{v:605,s:7},{v:610,s:6},{v:615,s:5},{v:620,s:4},{v:625,s:3},{v:630,s:2},{v:635,s:1}] },
                "jump": { op: ">=", steps: [{v:200,s:10},{v:190,s:9},{v:180,s:8},{v:170,s:7},{v:160,s:6},{v:155,s:5},{v:150,s:4},{v:145,s:3},{v:140,s:2},{v:135,s:1}] },
                "throw": { op: ">=", steps: [{v:13,s:15},{v:12,s:14},{v:11,s:13},{v:10,s:12},{v:9,s:11},{v:8.5,s:10},{v:8,s:9},{v:7.5,s:8},{v:7,s:7},{v:6.5,s:6},{v:6,s:5},{v:5.5,s:4},{v:5,s:3},{v:4.5,s:2},{v:3,s:1}] },
                "dead": { op: ">=", steps: [{v:140,s:20},{v:120,s:19},{v:110,s:18},{v:100,s:17},{v:90,s:16},{v:85,s:15},{v:80,s:14},{v:75,s:13},{v:70,s:12},{v:65,s:11},{v:60,s:10},{v:55,s:9},{v:50,s:8},{v:45,s:7},{v:40,s:6},{v:35,s:5},{v:30,s:4},{v:25,s:3},{v:20,s:1}] },
                "shut": { op: ">=", steps: [{v:15,s:10},{v:14,s:9},{v:13,s:8},{v:12,s:7},{v:11,s:6},{v:10,s:5},{v:9,s:4},{v:8,s:3},{v:7,s:2},{v:6,s:1}] },
                "carry": { op: ">=", steps: [{v:140,s:10},{v:120,s:9},{v:100,s:8},{v:90,s:7},{v:80,s:6},{v:70,s:5},{v:65,s:4},{v:60,s:3},{v:55,s:2},{v:50,s:1}] },
                "h_reps": { op: ">=", steps: [{v:15,s:6},{v:14,s:5},{v:13,s:4},{v:12,s:3},{v:11,s:2},{v:9,s:1}] },
                "h_secs": { op: ">=", steps: [{v:35,s:8},{v:32,s:7},{v:30,s:6},{v:28,s:5},{v:26,s:4},{v:24,s:3},{v:22,s:2},{v:20,s:1}] }
            }
        },
        "男": {
            "40-49": {
                "run": { op: "<=", steps: [{v:375,s:20},{v:390,s:19},{v:405,s:18},{v:420,s:17},{v:435,s:16},{v:450,s:15},{v:465,s:14},{v:480,s:13},{v:495,s:12},{v:505,s:11},{v:515,s:10},{v:525,s:9},{v:535,s:8},{v:545,s:7},{v:555,s:6},{v:565,s:5},{v:575,s:4},{v:585,s:3},{v:595,s:2},{v:605,s:1}] }
            }
            // 其餘數據可依此規則擴充
        }
    };

    function lookup(val, gender, ageGrp, item) {
        if (!val || isNaN(val) || val <= 0) return 0;
        const g = gender === '女' ? '女' : '男';
        const a = g === '女' ? '不分年齡' : ageGrp;
        const r = RULES[g] && RULES[g][a] ? RULES[g][a][item] : null;
        if (!r) return 0;
        for (let step of r.steps) {
            if (r.op === ">=" && val >= step.v) return step.s;
            if (r.op === "<=" && val <= step.v) return step.s;
        }
        return 0;
    }

    // ==========================================
    // 檔案操作 (CSV UTF-8 BOM 模式)
    // ==========================================
    function downloadSample(batName) {
        const headers = ["大隊", "分隊", "姓名", "性別", "年齡", "年齡層", "立定跳遠(cm)", "後拋擲遠(m)", "折返跑(趟)", "菱形槓硬舉(kg)", "懸吊(次)", "懸吊(秒)", "負重行走(kg)", "1500m跑(秒)"];
        const rows = UNIT_LIST[batName].map(u => [batName, u, "", "", "", ""]);
        const csv = Papa.unparse({ fields: headers, data: rows });
        const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
        saveAs(blob, `${batName}_填報範例.csv`);
    }

    function handleImport(input) {
        const file = input.files[0];
        if(!file) return;
        Papa.parse(file, {
            header: true, skipEmptyLines: true, encoding: "UTF-8",
            complete: function(results) {
                processData(results.data);
                input.value = "";
            }
        });
    }

    function processData(data) {
        const result = [];
        data.forEach((r, i) => {
            const v = (k) => { let n = parseFloat(r[k]); return isNaN(n) ? 0 : n; };
            let obj = {
                bat: r['大隊'], unit: r['分隊'], name: r['姓名'], gender: r['性別'] || '男', age: r['年齡'], ageGrp: r['年齡層'] || '30-39',
                vJ: v('立定跳遠(cm)'), vT: v('後拋擲遠(m)'), vS: v('折返跑(趟)'), vD: v('菱形槓硬舉(kg)'), 
                vH1: v('懸吊(次)'), vH2: v('懸吊(秒)'), vC: v('負重行走(kg)'), vR: v('1500m跑(秒)')
            };
            
            // Typo 修正
            if(obj.vT > 30) obj.vT /= 10;
            if(obj.vD > 500) obj.vD /= 10;

            // 換算得分
            obj.sJ = lookup(obj.vJ, obj.gender, obj.ageGrp, 'jump');
            obj.sT = lookup(obj.vT, obj.gender, obj.ageGrp, 'throw');
            obj.sS = lookup(obj.vS, obj.gender, obj.ageGrp, 'shut');
            obj.sD = lookup(obj.vD, obj.gender, obj.ageGrp, 'dead');
            obj.sC = lookup(obj.vC, obj.gender, obj.ageGrp, 'carry');
            obj.sR = lookup(obj.vR || 9999, obj.gender, obj.ageGrp, 'run');
            // 懸吊擇優
            obj.sH = Math.max(lookup(obj.vH1, obj.gender, obj.ageGrp, 'h_reps'), lookup(obj.vH2, obj.gender, obj.ageGrp, 'h_secs'));

            obj.total = obj.sJ + obj.sT + obj.sS + obj.sD + obj.sC + obj.sR + obj.sH;
            obj.grade = obj.total >= 60 ? "及格" : "不及格";
            obj.isErr = parseInt(obj.age) > 70 || (obj.vR === 0 && obj.vJ === 0);
            result.push(obj);
        });
        masterData = result;
        renderTable();
        updateStats();
        $('#btnExport').disabled = false;
    }

    function renderTable() {
        const body = $('#tableBody'); body.innerHTML = '';
        const keyword = $('#searchInput').value.toLowerCase();
        const filtered = masterData.filter(d => {
            if(currentBat === 'ERR') return d.isErr;
            const mBat = currentBat === 'ALL' || d.bat === currentBat;
            return mBat && (d.name.includes(keyword) || d.unit.includes(keyword));
        });

        filtered.slice(0, 150).forEach((r, i) => {
            const tr = document.createElement('tr');
            if(r.isErr) tr.classList.add('error-row');
            tr.innerHTML = `
                <td>${i+1}</td><td>${r.bat}</td><td>${r.unit}</td><td class="font-bold text-blue-700">${r.name}</td><td>${r.ageGrp}</td>
                <td class="font-black text-blue-900 bg-blue-50">${r.total}</td>
                <td class="bg-blue-50 font-bold ${r.grade==='及格'?'text-emerald-600':'text-rose-600'}">${r.grade}</td>
                <td>${r.sJ}</td><td>${r.sT}</td><td>${r.sS}</td><td>${r.sD}</td><td class="bg-amber-50 font-bold">${r.sH}</td><td>${r.sC}</td><td>${r.sR}</td>
            `;
            body.appendChild(tr);
        });
    }

    function changeBat(bat) {
        currentBat = bat;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        $(`#tab-${bat}`).classList.add('active');
        renderTable();
    }

    function updateStats() {
        $('#statTotal').innerText = `總計: ${masterData.length} 人`;
        $('#statPass').innerText = `及格: ${masterData.filter(d => d.grade==='及格').length} 人`;
    }

    function exportResults() {
        const headers = ["大隊", "分隊", "姓名", "性別", "年齡", "總分", "判定", "跳遠分", "後拋分", "折返分", "硬舉分", "懸吊分", "負重分", "跑步分"];
        const rows = masterData.map(d => [d.bat, d.unit, d.name, d.gender, d.age, d.total, d.grade, d.sJ, d.sT, d.sS, d.sD, d.sH, d.sC, d.sR]);
        const csv = Papa.unparse({ fields: headers, data: rows });
        const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
        saveAs(blob, `114年體能換算結果_${new Date().getTime()}.csv`);
    }
</script>
</body>
</html>
