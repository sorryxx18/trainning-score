    let SCORE_ENGINE = {};

    // 初始化：編譯 CSV 規則到 Memory
    function initEngine() {
        let parsed = Papa.parse(SCORING_CSV.trim(), { header: true, skipEmptyLines: true }).data;
        parsed.forEach(row => {
            let g = row['性別']; let a = row['年齡層']; let i = row['項目'];
            let op = row['比較方式']; let score = parseFloat(row['得分']); let limit = parseFloat(row['測驗值']);
            
            if (!SCORE_ENGINE[g]) SCORE_ENGINE[g] = {};
            if (!SCORE_ENGINE[g][a]) SCORE_ENGINE[g][a] = {};
            if (!SCORE_ENGINE[g][a][i]) SCORE_ENGINE[g][a][i] = { op: op, rules: [] };
            
            SCORE_ENGINE[g][a][i].rules.push({ limit: limit, score: score });
        });

        // 進行階梯式排序確保精準度
        for (let g in SCORE_ENGINE) {
            for (let a in SCORE_ENGINE[g]) {
                for (let i in SCORE_ENGINE[g][a]) {
                    let obj = SCORE_ENGINE[g][a][i];
                    if (obj.op === '>=') obj.rules.sort((x, y) => y.limit - x.limit); // 由大到小找 >=
                    if (obj.op === '<=') obj.rules.sort((x, y) => x.limit - y.limit); // 由小到大找 <=
                }
            }
        }
    }
    initEngine(); // 啟動即編譯

    // 核心查表邏輯
    function lookupScore(gender, ageGroup, item, val) {
        if (isNaN(val) || val === null || val === '') return 0;
        
        if (!SCORE_ENGINE[gender] || !SCORE_ENGINE[gender][ageGroup] || !SCORE_ENGINE[gender][ageGroup][item]) {
            return 0; // 找不到該組規則
        }
        
        let obj = SCORE_ENGINE[gender][ageGroup][item];
        for (let rule of obj.rules) {
            if (obj.op === '>=' && val >= rule.limit) return Math.max(0, rule.score);
            if (obj.op === '<=' && val <= rule.limit) return Math.max(0, rule.score);
        }
        return 0; 
    }

    // 防呆處理：年齡轉換為正確對照層
    function getMappedAge(gender, ageRaw, ageGroupStr) {
        if (gender === '女') return '不分年齡';
        let age = parseInt(ageRaw);
        if (!isNaN(age) && age >= 18 && age <= 65) {
            if (age < 30) return '20-29';
            if (age < 40) return '30-39';
            if (age < 50) return '40-49';
            return '50+';
        }
        // 若年齡是 124 這種 Typo，改抓欄位文字救回計算
        if (['20-29', '30-39', '40-49', '50+'].includes(ageGroupStr)) return ageGroupStr;
        return '20-29'; // 最終防爆
    }

    function switchPage(p) {
        $('#page-main').classList.toggle('hidden', p !== 'main');
        $('#page-export').classList.toggle('hidden', p !== 'export');
        $('.sidebar-link.active').classList.remove('active');
        $(`#nav-${p}`).classList.add('active');
    }

    function showLoading(t) { $('#loadingText').innerText = t; $('#loading').classList.remove('hidden').classList.add('flex'); }
    function hideLoading() { $('#loading').classList.add('hidden').classList.remove('flex'); }

    // 防止主線程卡死的高階封裝 (Yield to UI)
    function executeHeavyTask(taskName, taskFunc) {
        showLoading(taskName);
        setTimeout(async () => {
            try { await taskFunc(); } 
            catch (err) { console.error(err); alert("執行時發生錯誤: " + err.message); } 
            finally { hideLoading(); }
        }, 100);
    }

    // ==========================================
    // 匯入與運算
    // ==========================================
    function handleImport(input) {
        if (!input.files[0]) return;
        executeHeavyTask("正在讀取 Excel 並執行 1600 人交叉比對...", async () => {
            const workbook = new ExcelJS.Workbook();
            const reader = new FileReader();
            
            // Promise 封裝以配合 await
            await new Promise((resolve, reject) => {
                reader.onload = async (e) => {
                    try {
                        const buffer = e.target.result;
                        
                        // 判斷是 CSV 還是 Excel
                        if(input.files[0].name.endsWith('.csv')) {
                            const text = new TextDecoder("big5").decode(buffer);
                            // 若 Big5 失敗，這裡假設 UTF-8 已經被 PapaParse 處理好，我們用 Papa 處理
                            Papa.parse(input.files[0], {
                                header: true, skipEmptyLines: true,
                                complete: function(res) {
                                    processJSONData(res.data, true);
                                    resolve();
                                }
                            });
                        } else {
                            await workbook.xlsx.load(buffer);
                            const worksheet = workbook.worksheets[0];
                            const jsonData = [];
                            
                            // Excel to JSON
                            const keys =['num', 'empty', 'bat', 'unit', 'name', 'gender', 'age', 'ageGroup', 'jump', 'throw', 'shuttle', 'deadlift', 'hangReps', 'hangSecs', 'carry', 'run'];
                            worksheet.eachRow((row, rowNumber) => {
                                if (rowNumber === 1) return;
                                let obj = {};
                                row.eachCell({ includeEmpty: true }, (cell, colNumber) => {
                                    if(keys[colNumber-1]) obj[keys[colNumber-1]] = cell.value;
                                });
                                jsonData.push(obj);
                            });
                            processJSONData(jsonData, false);
                            resolve();
                        }
                    } catch (e) { reject(e); }
                };
                if(input.files[0].name.endsWith('.csv')) {
                    reader.readAsText(input.files[0], 'Big5'); // 暫時給 CSV 一條生路 (相容舊檔)
                } else {
                    reader.readAsArrayBuffer(input.files[0]);
                }
            });
            input.value = ''; // Reset
        });
    }

    function processJSONData(rawList, isCsvMap) {
        allData =[];
        rawList.forEach((r, i) => {
            let getVal = (k) => isCsvMap ? r[k] : r[k];
            
            let obj = {
                num: getVal(isCsvMap ? '號碼' : 'num') || i+1,
                bat: getVal(isCsvMap ? '單位' : 'unit') || '-',  // CSV 的 '單位' 其實是中隊/分隊
                unit: getVal(isCsvMap ? '單位' : 'unit') || '-', 
                name: getVal(isCsvMap ? '姓名' : 'name') || '-',
                gender: getVal(isCsvMap ? '性別' : 'gender') || '-',
                age: getVal(isCsvMap ? '年齡' : 'age') || 0,
                ageGroup: getVal(isCsvMap ? '年齡層' : 'ageGroup') || ''
            };
            
            if(isCsvMap) {
                obj.bat = r['單位'] || '-'; // CSV格式有些雜亂，先保留相容
            }

            // 解析數值與防呆 Typo 修正
            let parseN = (val) => { let n = parseFloat(val); return isNaN(n) ? 0 : n; };
            obj.jump = parseN(getVal(isCsvMap ? '立定跳遠(cm)' : 'jump'));
            obj.throw = parseN(getVal(isCsvMap ? '後拋擲遠(m)' : 'throw'));
            if(obj.throw > 30) obj.throw = obj.throw / 10; // Typo 修正 90 -> 9.0
            
            obj.shuttle = parseN(getVal(isCsvMap ? '折返跑(趟)' : 'shuttle'));
            obj.deadlift = parseN(getVal(isCsvMap ? '菱形槓硬舉(公斤)' : 'deadlift'));
            if(obj.deadlift > 500) obj.deadlift = obj.deadlift / 10; // Typo 修正 1250 -> 125
            
            obj.hangReps = parseN(getVal(isCsvMap ? '懸吊屈體(次)' : 'hangReps'));
            obj.hangSecs = parseN(getVal(isCsvMap ? '懸吊屈體(秒)' : 'hangSecs'));
            obj.carry = parseN(getVal(isCsvMap ? '六角槓負重行走(公斤)' : 'carry'));
            
            // 處理時間 00:00 轉為 9999 (0 分)
            let rawRun = getVal(isCsvMap ? '1500公尺跑步(秒)' : 'run');
            obj.run = parseN(rawRun);
            if (rawRun === '00:00' || obj.run === 0) obj.run = 9999; 

            // 執行大腦查表
            let mappedAge = getMappedAge(obj.gender, obj.age, obj.ageGroup);
            
            obj.jumpScore = lookupScore(obj.gender, mappedAge, '立定跳遠', obj.jump);
            obj.throwScore = lookupScore(obj.gender, mappedAge, '後拋擲遠', obj.throw);
            obj.shuttleScore = lookupScore(obj.gender, mappedAge, '折返跑', obj.shuttle);
            obj.deadScore = lookupScore(obj.gender, mappedAge, '菱形槓硬舉', obj.deadlift);
            obj.carryScore = lookupScore(obj.gender, mappedAge, '負重行走', obj.carry);
            obj.runScore = lookupScore(obj.gender, mappedAge, '1500跑步', obj.run);
            
            // 懸吊 MAX 邏輯
            let hangR = lookupScore(obj.gender, mappedAge, '懸吊屈體', obj.hangReps);
            let hangS = lookupScore(obj.gender, mappedAge, '懸吊秒數', obj.hangSecs);
            obj.hangMaxScore = Math.max(hangR, hangS);

            // 總分與判定
            obj.totalScore = obj.jumpScore + obj.throwScore + obj.shuttleScore + obj.deadScore + obj.carryScore + obj.runScore + obj.hangMaxScore;
            obj.grade = obj.totalScore >= 60 ? "及格" : "不及格";
            
            // 系統異常標記
            obj.checkMsg = "";
            if (parseInt(obj.age) > 65) obj.checkMsg += "年齡異常 ";
            if (obj.run === 9999 && obj.jump === 0) obj.checkMsg += "疑似缺考";

            allData.push(obj);
        });

        updateStats();
        filterByBattalion('ALL');
        $('#btnExpFull').disabled = false;
        $('#btnExpFail').disabled = false;
    }

    // ==========================================
    // UI 控制
    // ==========================================
    function updateStats() {
        $('#totalCount').innerText = allData.length;
        $('#passCount').innerText = allData.filter(d => d.grade === '及格').length;
        $('#errorCount').innerText = allData.filter(d => d.checkMsg !== "").length;
    }

    function filterByBattalion(bat) {
        currentBattalion = bat;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        $(`#tab-${bat}`).classList.add('active');
        renderTable();
    }

    function renderTable() {
        const body = $('#tableBody');
        body.innerHTML = '';
        
        const search = $('#searchInput').value.toLowerCase();
        
        const filtered = allData.filter(d => {
            if (currentBattalion === '異常') return d.checkMsg !== "";
            const matchBat = currentBattalion === 'ALL' || d.bat.includes(currentBattalion) || d.unit.includes(currentBattalion);
            const matchSearch = search === "" || d.name.includes(search) || d.unit.includes(search);
            return matchBat && matchSearch;
        });

        // 限制顯示 200 筆防止卡頓 (前端虛擬化)
        const displayData = filtered.slice(0, 200);

        displayData.forEach((r, i) => {
            const tr = document.createElement('tr');
            if(r.checkMsg) tr.className = "error-row";
            tr.innerHTML = `
                <td class="text-slate-400 font-mono">${i+1}</td>
                <td class="font-bold text-slate-500">${r.bat}</td><td class="font-bold">${r.unit}</td>
                <td class="text-blue-700 font-bold">${r.name}</td>
                <td><span title="原填:${r.age}">${r.gender} ${r.ageGroup}</span></td>
                <td class="font-black text-lg text-blue-900 bg-blue-50">${r.totalScore}</td>
                <td class="bg-blue-50"><span class="px-2 py-1 rounded-md text-[11px] font-bold ${r.grade==='及格'?'bg-emerald-100 text-emerald-700':'bg-rose-100 text-rose-700'}">${r.grade}</span></td>
                <td><span class="text-xs text-slate-400 mr-1">${r.jump}</span> ${r.jumpScore}</td>
                <td><span class="text-xs text-slate-400 mr-1">${r.throw}</span> ${r.throwScore}</td>
                <td><span class="text-xs text-slate-400 mr-1">${r.shuttle}</span> ${r.shuttleScore}</td>
                <td><span class="text-xs text-slate-400 mr-1">${r.deadlift}</span> ${r.deadScore}</td>
                <td class="bg-amber-50 text-amber-900 font-bold"><span class="text-xs text-amber-600/50 mr-1" title="次:${r.hangReps}/秒:${r.hangSecs}">(${r.hangReps}/${r.hangSecs})</span> ${r.hangMaxScore}</td>
                <td><span class="text-xs text-slate-400 mr-1">${r.carry}</span> ${r.carryScore}</td>
                <td><span class="text-xs text-slate-400 mr-1">${r.run===9999?0:r.run}</span> ${r.runScore}</td>
                <td class="text-xs text-rose-600 font-bold">${r.checkMsg}</td>
            `;
            body.appendChild(tr);
        });
        
        if (filtered.length > 200) {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td colspan="15" class="text-center text-slate-400 py-4 text-xs">... 已隱藏其餘 ${filtered.length - 200} 筆資料以保持流暢，匯出時將包含全部資料。</td>`;
            body.appendChild(tr);
        }
    }

    // ==========================================
    // 匯出 Excel
    // ==========================================
    function exportExcelResult(mode) {
        executeHeavyTask(`正在產生 ${mode === 'FAIL' ? '不及格' : '完整'} 成績報表...`, async () => {
            const wb = new ExcelJS.Workbook();
            const ws = wb.addWorksheet('換算總表');
            
            // 對齊使用者要求的輸出 Header
            ws.columns =[
                {header:'大隊', key:'bat', width:15}, {header:'單位', key:'unit', width:15}, 
                {header:'姓名', key:'name', width:12}, {header:'性別', key:'gender', width:8}, 
                {header:'年齡層', key:'ageGroup', width:12},
                {header:'立定跳遠_得分', key:'jumpScore', width:15}, {header:'後拋擲遠_得分', key:'throwScore', width:15},
                {header:'折返跑_得分', key:'shuttleScore', width:15}, {header:'菱形槓硬舉_得分', key:'deadScore', width:18},
                {header:'懸吊屈體_得分', key:'hangRepScore', width:15}, {header:'懸吊秒數_得分', key:'hangSecScore', width:15},
                {header:'負重行走_得分', key:'carryScore', width:15}, {header:'1500跑步_得分', key:'runScore', width:15},
                {header:'懸吊比較_MAX', key:'hangMaxScore', width:15},
                {header:'總分', key:'totalScore', width:10}, {header:'及格', key:'grade', width:10},
                {header:'系統備註', key:'checkMsg', width:20}
            ];

            ws.getRow(1).eachCell(c => {
                c.font = { bold: true, color: { argb: 'FFFFFFFF' } };
                c.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF1E293B' } };
            });
            ws.views =[{ state: 'frozen', xSplit: 0, ySplit: 1 }];

            const targetData = mode === 'FAIL' ? allData.filter(d => d.grade === '不及格') : allData;
            
            targetData.forEach(r => {
                // 回推單項懸吊分數給匯出用
                let mappedAge = getMappedAge(r.gender, r.age, r.ageGroup);
                let r1 = lookupScore(r.gender, mappedAge, '懸吊屈體', r.hangReps);
                let r2 = lookupScore(r.gender, mappedAge, '懸吊秒數', r.hangSecs);

                let rowObj = { ...r, hangRepScore: r1, hangSecScore: r2 };
                let newRow = ws.addRow(rowObj);
                
                if(r.grade === '不及格') {
                    newRow.getCell('grade').font = { color: { argb: 'FFDC2626' }, bold: true };
                } else {
                    newRow.getCell('grade').font = { color: { argb: 'FF059669' }, bold: true };
                }
                if(r.checkMsg) newRow.getCell('checkMsg').font = { color: { argb: 'FFDC2626' }, bold: true };
            });

            const buf = await wb.xlsx.writeBuffer();
            saveAs(new Blob([buf]), `新式體能換算成績冊_${new Date().getTime()}.xlsx`);
        });
    }
