    function initScoring() {
        let p = Papa.parse(RAW_RULES.trim(), {header:true}).data;
        p.forEach(r => {
            let k = `${r.性別}_${r.年齡層}_${r.項目}`;
            if(!SCORE_MAP[k]) SCORE_MAP[k] = {op: r.比較方式, steps:[]};
            SCORE_MAP[k].steps.push({v: parseFloat(r.值), s: parseInt(r.得分)});
        });
        // 排序規則
        for(let k in SCORE_MAP) {
            let m = SCORE_MAP[k];
            if(m.op === '>=') m.steps.sort((a,b) => b.v - a.v); // 大到小
            else m.steps.sort((a,b) => a.v - b.v); // 小到大
        }
    }
    initScoring();

    function getPreciseScore(val, gender, ageGrp, item) {
        if(!val || isNaN(val) || val <= 0) return 0;
        let k = `${gender}_${gender==='女'?'不分年齡':ageGrp}_${item}`;
        let rule = SCORE_MAP[k];
        if(!rule) return 0;
        for(let s of rule.steps) {
            if(rule.op === '>=' && val >= s.v) return s.s;
            if(rule.op === '<=' && val <= s.v) return s.s;
        }
        return 0;
    }

    // ==========================================
    // 2. Excel 處理 (非同步，防止轉圈圈卡死)
    // ==========================================
    function showLoading(msg) { $('#loadingText').innerText = msg; $('#loading').classList.remove('hidden').classList.add('flex'); }
    function hideLoading() { $('#loading').classList.add('hidden'); }

    async function exportSample(bat) {
        showLoading(`正在生成 ${bat} 範例 Excel...`);
        // 延遲執行，讓 UI 渲染轉圈圈
        await new Promise(r => setTimeout(r, 100));
        
        try {
            const wb = new ExcelJS.Workbook();
            const ws = wb.addWorksheet('填報表');
            ws.columns = [
                {header:'項次', width:6}, {header:'大隊', width:12}, {header:'單位', width:15}, {header:'姓名', width:12},
                {header:'性別(男/女)', width:12}, {header:'年齡', width:8}, {header:'年齡層', width:12},
                {header:'跳遠(cm)', width:10}, {header:'後拋(m)', width:10}, {header:'折返(趟)', width:10},
                {header:'硬舉(kg)', width:10}, {header:'懸吊(次)', width:10}, {header:'懸吊(秒)', width:10},
                {header:'負重(kg)', width:10}, {header:'跑步(秒)', width:10}
            ];
            ws.getRow(1).font = {bold:true, color:{argb:'FFFFFFFF'}};
            ws.getRow(1).fill = {type:'pattern', pattern:'solid', fgColor:{argb:'FF1E293B'}};

            const list = UNITS[bat] || [];
            list.forEach((u, i) => ws.addRow([i+1, bat, u]));

            const buf = await wb.xlsx.writeBuffer();
            saveAs(new Blob([buf]), `${bat}_填報範例.xlsx`);
        } catch (e) { alert("生成失敗"); }
        hideLoading();
    }

    async function handleImport(input) {
        const file = input.files[0];
        if(!file) return;
        showLoading("讀取檔案並執行 1,600 人交叉換算中...");
        await new Promise(r => setTimeout(r, 100));

        try {
            const wb = new ExcelJS.Workbook();
            await wb.xlsx.load(file);
            const ws = wb.worksheets[0];
            const resultArr = [];

            ws.eachRow((row, rowNumber) => {
                if(rowNumber === 1) return;
                let r = {
                    bat: row.getCell(2).value || '',
                    unit: row.getCell(3).value || '',
                    name: row.getCell(4).value || '',
                    gender: row.getCell(5).value || '男',
                    age: parseInt(row.getCell(6).value) || 0,
                    ageGrp: row.getCell(7).value || '30-39',
                    vJ: parseFloat(row.getCell(8).value) || 0,
                    vT: parseFloat(row.getCell(9).value) || 0,
                    vS: parseFloat(row.getCell(10).value) || 0,
                    vD: parseFloat(row.getCell(11).value) || 0,
                    vH1: parseFloat(row.getCell(12).value) || 0,
                    vH2: parseFloat(row.getCell(13).value) || 0,
                    vC: parseFloat(row.getCell(14).value) || 0,
                    vR: parseFloat(row.getCell(15).value) || 0
                };
                
                // 修正小數點位移 (髒資料處理)
                if(r.vT > 30) r.vT /= 10;
                if(r.vD > 500) r.vD /= 10;

                // 執行換算
                r.sJ = getPreciseScore(r.vJ, r.gender, r.ageGrp, '立定跳遠');
                r.sT = getPreciseScore(r.vT, r.gender, r.ageGrp, '後拋擲遠');
                r.sS = getPreciseScore(r.vS, r.gender, r.ageGrp, '折返跑');
                r.sD = getPreciseScore(r.vD, r.gender, r.ageGrp, '菱形槓硬舉');
                r.sC = getPreciseScore(r.vC, r.gender, r.ageGrp, '負重行走');
                r.sR = getPreciseScore(r.vR || 9999, r.gender, r.ageGrp, '1500跑步');
                
                // 懸吊擇優
                r.sH = Math.max(getPreciseScore(r.vH1, r.gender, r.ageGrp, '懸吊屈體'), getPreciseScore(r.vH2, r.gender, r.ageGrp, '懸吊秒數'));

                r.total = r.sJ + r.sT + r.sS + r.sD + r.sC + r.sR + r.sH;
                r.grade = r.total >= 60 ? '及格' : '不及格';
                resultArr.push(r);
            });

            masterData = resultArr;
            renderTable();
            updateStats();
            $('#btnExport').disabled = false;
        } catch (e) { alert("讀取失敗，請確認檔案格式"); }
        hideLoading();
        input.value = "";
    }

    function renderTable() {
        const body = $('#tableBody'); body.innerHTML = "";
        const search = $('#searchInput').value.toLowerCase();
        const filtered = masterData.filter(d => {
            const mBat = currentBat === 'ALL' || d.bat === currentBat;
            return mBat && (d.name.includes(search) || d.unit.includes(search));
        });

        // 大數據分頁預覽，只顯 100 筆
        filtered.slice(0, 100).forEach((r, i) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${i+1}</td><td>${r.bat}</td><td>${r.unit}</td><td class="font-bold text-blue-700">${r.name}</td><td>${r.ageGrp}</td>
                <td class="font-black text-blue-900 bg-blue-50">${r.total}</td>
                <td class="bg-blue-50 font-bold text-[10px] ${r.grade==='及格'?'text-emerald-600':'text-rose-600'}">${r.grade}</td>
                <td>${r.sJ}</td><td>${r.sT}</td><td>${r.sS}</td><td>${r.sD}</td><td class="bg-amber-50 font-bold">${r.sH}</td><td>${r.sC}</td><td>${r.sR}</td>
            `;
            body.appendChild(tr);
        });
        if(filtered.length === 0 && masterData.length > 0) body.innerHTML = '<tr><td colspan="15" class="py-20 text-slate-300">查無資料</td></tr>';
    }

    function changeBatTab(bat) {
        currentBat = bat;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        $(`#tab-${bat}`).classList.add('active');
        renderTable();
    }

    function updateStats() {
        $('#totalC').innerText = masterData.length;
        $('#passC').innerText = masterData.filter(d => d.grade==='及格').length;
    }

    async function exportResults() {
        showLoading("正在產生正式成績報表...");
        await new Promise(r => setTimeout(r, 100));
        try {
            const wb = new ExcelJS.Workbook();
            const ws = wb.addWorksheet('換算總表');
            ws.columns = [
                {header:'大隊', key:'bat', width:12}, {header:'單位', key:'unit', width:15}, {header:'姓名', key:'name', width:12},
                {header:'性別', key:'gender', width:8}, {header:'年齡層', key:'ageGrp', width:12},
                {header:'立定跳遠_得分', key:'sJ'}, {header:'後拋擲遠_得分', key:'sT'}, {header:'折返跑_得分', key:'sS'},
                {header:'硬舉_得分', key:'sD'}, {header:'懸吊比較_MAX', key:'sH'}, {header:'負重行走_得分', key:'sC'},
                {header:'1500跑步_得分', key:'sR'}, {header:'總分', key:'total'}, {header:'及格判定', key:'grade'}
            ];
            masterData.forEach(r => ws.addRow(r));
            const buffer = await wb.xlsx.writeBuffer();
            saveAs(new Blob([buffer]), `換算成績冊_${new Date().getTime()}.xlsx`);
        } catch (e) { alert("匯出失敗"); }
        hideLoading();
    }
</script>
</body>
</html>
