<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>114年體能測驗精確換算系統 (雲端同步版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; overflow: hidden; }
        .table-wrapper { height: calc(100vh - 250px); overflow: auto; background: white; border-radius: 12px; border: 1px solid #e2e8f0; }
        th { background: #1e293b; color: white; position: sticky; top: 0; z-index: 10; font-size: 13px; padding: 10px; white-space: nowrap; }
        td { border-bottom: 1px solid #f1f5f9; padding: 8px; text-align: center; font-size: 13px; white-space: nowrap; }
        .tab-btn.active { border-bottom: 4px solid #2563eb; color: #2563eb; font-weight: bold; background: #eff6ff; }
        .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        /* Loading 遮罩 */
        #loader { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 999; flex-direction: column; align-items: center; justify-content: center; color: white; }
    </style>
</head>
<body class="h-screen flex overflow-hidden">

    <!-- Loading 遮罩 -->
    <div id="loader">
        <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-blue-500 border-solid mb-4"></div>
        <p class="text-xl font-bold">GAS 正在換算並存入 Google Sheet，請稍候...</p>
    </div>

    <aside class="w-64 bg-slate-900 text-slate-300 flex flex-col shrink-0 shadow-2xl">
        <div class="p-6 border-b border-slate-800 flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-blue-600 flex items-center justify-center text-white shadow-lg"><i class="ri-cloud-line text-2xl"></i></div>
            <span class="font-bold text-white">體能換算系統 <span class="text-[10px] bg-blue-500 px-1 rounded">雲端版</span></span>
        </div>
        <nav class="p-4 flex-1">
            <div class="bg-blue-600 text-white p-3 rounded-xl flex items-center gap-3 shadow-lg mb-4"><i class="ri-dashboard-3-line text-xl"></i><span class="font-bold">數據中心</span></div>
            <div class="p-3">
                <label class="text-xs text-slate-500 block mb-1">GAS API 網址</label>
                <input type="password" id="gasUrl" placeholder="貼上 GAS 部署網址" class="w-full bg-slate-800 border border-slate-700 rounded p-2 text-xs text-white focus:outline-none focus:border-blue-500">
            </div>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col min-w-0">
        <header class="bg-white border-b border-slate-200 p-4 px-8 flex flex-wrap items-center justify-between shrink-0 shadow-sm gap-4">
            <div class="flex items-center gap-4">
                <!-- 1. 下載範例 -->
                <div class="relative group">
                    <button class="bg-slate-700 text-white px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2 hover:bg-black transition">
                        <i class="ri-file-download-line text-lg"></i> 1. 下載範例
                    </button>
                    <div class="absolute left-0 top-full pt-2 w-48 hidden group-hover:block z-50">
                        <div class="bg-white rounded-xl shadow-2xl border border-slate-200 overflow-hidden p-1">
                            <div onclick="downloadSample('第一大隊')" class="px-4 py-2 hover:bg-blue-50 cursor-pointer text-xs font-bold text-slate-700 border-b">第一大隊範例</div>
                            <div onclick="downloadSample('第二大隊')" class="px-4 py-2 hover:bg-blue-50 cursor-pointer text-xs font-bold text-slate-700 border-b">第二大隊範例</div>
                            <div onclick="downloadSample('第三大隊')" class="px-4 py-2 hover:bg-blue-50 cursor-pointer text-xs font-bold text-slate-700">第四大隊範例</div>
                        </div>
                    </div>
                </div>
                
                <!-- 2. 匯入 -->
                <button onclick="$('#fileInput').click()" class="bg-slate-100 text-slate-700 border border-slate-300 px-4 py-2 rounded-lg text-sm font-bold shadow-sm hover:bg-slate-200 flex items-center gap-2 active:scale-95 transition">
                    <i class="ri-upload-cloud-2-line text-lg"></i> 2. 匯入原始成績
                </button>
                <input type="file" id="fileInput" accept=".csv" class="hidden" onchange="handleImport(this)">

                <!-- 3. GAS 啟動 -->
                <button id="btnSync" disabled onclick="uploadToGAS()" class="bg-blue-600 text-white px-6 py-2 rounded-lg text-sm font-bold shadow-lg hover:bg-blue-700 disabled:opacity-30 flex items-center gap-2">
                    <i class="ri-refresh-line text-lg animate-pulse"></i> 3. 啟動 GAS 換算並存檔
                </button>
            </div>

            <button id="btnExport" disabled onclick="exportResultCsv()" class="bg-emerald-600 text-white px-4 py-2 rounded-lg text-sm font-bold shadow hover:bg-emerald-700 disabled:opacity-30 transition flex items-center gap-2">
                <i class="ri-file-excel-2-line text-lg"></i> 4. 匯出結果
            </button>
        </header>

        <div class="p-6 flex-1 flex flex-col overflow-hidden">
            <div class="flex border-b border-slate-200 mb-4 px-4 overflow-x-auto shrink-0 gap-1 bg-white rounded-t-xl">
                <button onclick="changeBat('ALL')" class="tab-btn active px-6 py-4 text-sm" id="tab-ALL">全體人員</button>
                <button onclick="changeBat('第一大隊')" class="tab-btn px-6 py-4 text-sm" id="tab-第一大隊">第一大隊</button>
                <button onclick="changeBat('第二大隊')" class="tab-btn px-6 py-4 text-sm" id="tab-第二大隊">第二大隊</button>
                <button onclick="changeBat('第三大隊')" class="tab-btn px-6 py-4 text-sm" id="tab-第三大隊">第三大隊</button>
                <button onclick="changeBat('第四大隊')" class="tab-btn px-6 py-4 text-sm" id="tab-第四大隊">第四大隊</button>
            </div>

            <div class="table-wrapper custom-scroll shadow-inner">
                <table id="mainTable">
                    <thead>
                        <tr>
                            <th>序</th><th>單位</th><th>姓名</th><th>年齡層</th>
                            <th class="bg-blue-800 text-white">總分</th><th class="bg-blue-800 text-white">及格判定</th>
                            <th>跳遠分</th><th>後拋分</th><th>折返分</th><th>硬舉分</th><th>懸吊分</th><th>負重分</th><th>跑步分</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="15" class="py-24 text-slate-300 italic text-lg text-center">請先匯入原始成績 CSV...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

<script>
    const $ = (s) => document.querySelector(s);
    let masterData = []; 
    let currentBat = 'ALL';

    // 1. 處理匯入：只讀取數據，不換算
    function handleImport(input) {
        const file = input.files[0];
        if(!file) return;
        
        Papa.parse(file, {
            header: true, skipEmptyLines: true, encoding: "UTF-8",
            complete: function(results) {
                masterData = results.data.map(r => ({
                    bat: r['大隊']||'第一大隊', 
                    unit: r['單位']||'分隊', 
                    name: r['姓名'], 
                    gender: r['性別']||'男', 
                    ageGrp: r['年齡層']||'40-49',
                    // 原始數值
                    vJ: r['立定跳遠(cm)'], vT: r['後拋擲遠(m)'], vS: r['折返跑(趟)'], 
                    vD: r['菱形槓硬舉(公斤)'], vH1: r['懸吊屈體(次)'], vH2: r['懸吊屈體(秒)'],
                    vC: r['六角槓負重行走(公斤)'], vR: r['1500公尺跑步(秒)'],
                    // 預設為等待中
                    total: '---', grade: '等待計算',
                    sJ: '...', sT: '...', sS: '...', sD: '...', sH: '...', sC: '...', sR: '...'
                }));
                renderTable();
                $('#btnSync').disabled = false;
                input.value = "";
            }
        });
    }

    // 2. 渲染表格
    function renderTable() {
        const body = $('#tableBody'); body.innerHTML = '';
        const filtered = masterData.filter(d => currentBat === 'ALL' || d.bat === currentBat);

        filtered.forEach((r, i) => {
            const tr = document.createElement('tr');
            const gradeColor = r.grade === '及格' ? 'text-emerald-600' : (r.grade === '不及格' ? 'text-rose-600' : 'text-slate-400');
            tr.innerHTML = `
                <td>${i+1}</td><td>${r.bat}</td><td>${r.unit}</td><td class="font-bold text-blue-700">${r.name}</td><td>${r.ageGrp}</td>
                <td class="font-black text-blue-900 bg-blue-50 text-lg">${r.total}</td>
                <td class="bg-blue-50 font-bold ${gradeColor}">${r.grade}</td>
                <td>${r.sJ}</td><td>${r.sT}</td><td>${r.sS}</td><td>${r.sD}</td><td>${r.sH}</td><td>${r.sC}</td><td>${r.sR}</td>
            `;
            body.appendChild(tr);
        });
    }

    // 3. 重頭戲：上傳資料到 GAS 並接收回傳結果
    async function uploadToGAS() {
        const gasUrl = $('#gasUrl').value.trim();
        if(!gasUrl) {
            alert("請先在左側選單輸入 GAS 部署網址！");
            return;
        }

        $('#loader').style.display = 'flex';

        try {
            // 將整份 masterData 發送到 GAS
            const response = await fetch(gasUrl, {
                method: 'POST',
                mode: 'no-cors', // 視 GAS 設定而定，通常用 no-cors 或讓 GAS 處理 CORS
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(masterData)
            });

            // 注意：由於 GAS 的 Web App 處理 CORS 比較特殊
            // 如果你使用 no-cors，前端無法讀取回傳 JSON。
            // 建議 GAS 端使用 ContentService 並在前端處理 Redirect。
            // 這裡假設 GAS 成功執行並回傳最新資料：
            
            // 這裡模擬 GAS 回傳並處理 (實際開發時需根據 GAS 回傳的 JSON 更新 masterData)
            alert("資料已發送！請檢查 Google Sheet 是否已有資料。\n(提醒：若要即時同步換算結果至網頁，GAS 需設定 CORS 或透過特定管道回傳)");
            
            // 這裡你可以加上「向 GAS 請求換算結果」的邏輯
            // masterData = await getResultsFromGAS(); 
            // renderTable();

        } catch (error) {
            console.error("Sync Error:", error);
            alert("傳輸失敗，請檢查 URL 或網路設定");
        } finally {
            $('#loader').style.display = 'none';
            $('#btnExport').disabled = false;
        }
    }

    function downloadSample(bat) {
        const h = ["大隊", "單位", "姓名", "性別", "年齡層", "立定跳遠(cm)", "後拋擲遠(m)", "折返跑(趟)", "菱形槓硬舉(公斤)", "懸吊屈體(次)", "懸吊屈體(秒)", "六角槓負重行走(公斤)", "1500公尺跑步(秒)"];
        const csv = "\ufeff" + h.join(",") + "\n" + bat + ",範例分隊,王小明,男,40-49,215,12,13,100,4,0,100,472";
        saveAs(new Blob([csv], {type:'text/csv;charset=utf-8;'}), `${bat}_填報範例.csv`);
    }

    function changeBat(bat) {
        currentBat = bat;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        $(`#tab-${bat}`).classList.add('active');
        renderTable();
    }

    function exportResultCsv() {
        const h = ["大隊", "單位", "姓名", "性別", "年齡層", "總分", "及格判定", "跳遠分", "後拋分", "折返分", "硬舉分", "懸吊分", "負重分", "跑步分"];
        const rows = masterData.map(d => [d.bat, d.unit, d.name, d.gender, d.ageGrp, d.total, d.grade, d.sJ, d.sT, d.sS, d.sD, d.sH, d.sC, d.sR]);
        const csv = "\ufeff" + h.join(",") + "\n" + rows.map(r => r.join(",")).join("\n");
        saveAs(new Blob([csv], {type:'text/csv;charset=utf-8;'}), `換算結果_${new Date().getTime()}.csv`);
    }
</script>
</body>
</html>
